<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页 - 哲学AI对话系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        
        .header-nav {
            background: linear-gradient(135deg, #a8fcd9 0%, #60b2f5 100%);
            height: 70px;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #93c7f8, #a9e3f8);
            border-radius: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color:rgb(90, 87, 87);
        }
        
        .main-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .profile-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #98e2eb, #3f99ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin: 0 auto 20px;
            border: 5px solid white;
        
        }
        
        h2 {
            font-size: 2rem;
            color: #1a3a5f;
            margin-bottom: 10px;
        }
        
        .username {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .welcome-message {
            font-size: 1.2rem;
            color: #2c5282;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #1a3a5f;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-btn:hover {
            color: #2c5282;
        }
        
        .logout-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header-nav">
        <div class="nav-container">
            <a href="aichat_root.html" class="logo">
                  个人用户
            </a>
        </div>
    </header>
    
    <!-- 主内容区 -->
    <main class="main-container">
        <a href="aichat_root.html" class="back-btn">
            返回首页
        </a>
        
        <div id="profileContent">
            <div class="loading" id="loading">
                 加载中...
            </div>
            
            <div class="profile-card" id="profileCard" style="display: none;">
                <!-- JS会在这里显示内容 -->
            </div>
        </div>
    </main>
    
    <!-- 引入JS文件 -->
    <script src="aichat_profile.js"></script>
</body>
</html>
