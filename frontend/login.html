<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 全栈应用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-container">
        <header>
            <h1>🔐 用户登录</h1>
            <p>欢迎使用全栈应用系统</p>
        </header>

        <div class="section">
            <h2>请输入登录信息</h2>
            <div class="form-group">
                <input type="text" id="usernameInput" placeholder="用户名" class="input" autofocus>
                <input type="password" id="passwordInput" placeholder="密码" class="input">
                <button onclick="login()" class="btn btn-success">登录</button>
                <button onclick="testAutoLogin()" class="btn btn-info">测试登录</button>
            </div>
            <div id="loginResult" class="result">等待登录...</div>
        </div>

        <div class="login-footer">
            <p>没有账户？<a href="#" onclick="register()">立即注册</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
