<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哲学AI对话系统 - 登录</title>
    <link rel="stylesheet" href="aichat_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <!-- 左侧图片区域 -->
        <div class="login-left">
            <div class="image-overlay">
                <div class="welcome-text">
                    <h1>智能AI角色对话系统</h1>
                    <p class="subtitle">与智者对话，探索智慧之源</p>
                    <p class="description">
                        与哲学家/作家/影视角色实现对话，体验智能对话<br>
                        开启您的思想探索之旅
                    </p>
                    <div class="features">
                        <div class="feature-item">
                             <span>智能对话</span>
                        </div>
                        <div class="feature-item">
                              <span>知识库</span>
                        </div>
                        <div class="feature-item">
                              <span>身临其境</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧登录区域 -->
        <div class="login-right">
            <div class="login-form-container">
                <!-- 返回首页按钮 -->
                <a href="aichat_root.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </a>

                <!-- 登录/注册切换 -->
                <div class="form-switch">
                    <button class="switch-btn active" id="loginBtn">登录</button>
                    <button class="switch-btn" id="registerBtn">注册</button>
                </div>

                <!-- 登录表单 -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-header">
                        <h2>用户登录</h2>
                        <p>请输入您的账户信息</p>
                        <!-- 修改第37行： -->
<div id="messageBox" style="display: none; padding: 12px; margin: 10px 0; border-radius: 6px;"></div>
                    </div>

                    <div class="form-group">
                        <label for="loginUsername">
                            <i class="fas fa-user"></i> 用户名或邮箱
                        </label>
                        <input 
                            type="text" 
                            id="loginUsername" 
                            name="username"
                            placeholder="请输入用户名或邮箱"
                            required
                        >
                        <div class="error-message" id="loginUsernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                name="password"
                                placeholder="请输入密码"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="loginPasswordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            记住我
                        </label>
                       
                    </div>

                    <button type="submit" class="submit-btn" id="loginSubmitBtn">
                        <span>登录</span>
                        <div class="spinner hidden">
                            <div class="bounce1"></div>
                            <div class="bounce2"></div>
                            <div class="bounce3"></div>
                        </div>
                    </button>
                </form>

                <!-- 注册表单 -->
                <form id="registerForm" class="auth-form">
                    <div class="form-header">
                        <h2>用户注册</h2>
                        <p>创建您的哲学AI账户</p>
                    </div>

                    <div class="form-group">
                        <label for="registerUsername">
                            <i class="fas fa-user"></i> 用户名
                        </label>
                        <input 
                            type="text" 
                            id="registerUsername" 
                            name="username"
                            placeholder="请输入用户名（3-20位字母数字）"
                            required
                        >
                        <div class="error-message" id="registerUsernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">
                            <i class="fas fa-envelope"></i> 邮箱
                        </label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            name="email"
                            placeholder="请输入邮箱"
                            required
                        >
                        <div class="error-message" id="registerEmailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="registerFullName">
                            <i class="fas fa-id-card"></i> 姓名
                        </label>
                        <input 
                            type="text" 
                            id="registerFullName" 
                            name="full_name"
                            placeholder="请输入您的姓名"
                            required
                        >
                        <div class="error-message" id="registerFullNameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="registerPassword" 
                                name="password"
                                placeholder="请输入密码（至少6位）"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('registerPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="registerPasswordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">
                            <i class="fas fa-lock"></i> 确认密码
                        </label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="registerConfirmPassword" 
                                name="confirm_password"
                                placeholder="请再次输入密码"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="registerConfirmPasswordError"></div>
                    </div>

                    

                    <button type="submit" class="submit-btn" id="registerSubmitBtn">
                        <span>注册</span>
                        <div class="spinner hidden">
                            <div class="bounce1"></div>
                            <div class="bounce2"></div>
                            <div class="bounce3"></div>
                        </div>
                    </button>
                
                </form>

               
                

          
        </div>
    </div>

    <!-- 模态框容器 -->
    <div id="modalContainer"></div>

    <script src="aichat_login.js"></script>
</body>
</html>
