# Railway 部署配置文件
# 将此文件放在项目根目录

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && gunicorn app:app"
healthcheckPath = "/"

[deploy.healthcheck]
timeout = 180
interval = 30

[[services]]
name = "aichat-backend"
type = "web"

[services.env]
PORT = "5000"

[[services.ports]]
port = 5000
type = "HTTP"
handle = "true"
